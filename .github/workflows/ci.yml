# .github/workflows/ci.yml
name: Hakikisha CI

on:
  push:
    branches: ["**"]        # runs on every branch push
  
jobs:
  server:
    name: Server — Lint, Type Check, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hakikisha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hakikisha_test
      JWT_SECRET: ci_test_secret_not_real
      RESEND_API_KEY: re_test_placeholder
      CLIENT_URL: http://localhost:5173
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        working-directory: server

      - name: Run ESLint
        run: npx eslint src --max-warnings 0
        working-directory: server

      - name: Run database schema
        run: psql $DATABASE_URL -f src/db/schema.sql
        working-directory: server

      - name: Run tests
        run: npm test
        working-directory: server

  client:
    name: Client — Lint, Type Check, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        working-directory: client

      - name: Run ESLint
        run: npx eslint src --max-warnings 0
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: http://localhost:3001